name: ci

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - run: go vet ./...
      - run: go build ./...
      - run: go test ./...
      # The job runner does concurrent subprocess cancellation; gate it.
      - if: runner.os == 'Linux'
        run: go test -race ./...
      # Smoke-fuzz the output sanitizer so regressions don't rely on
      # contributors remembering to fuzz locally.
      - if: runner.os == 'Linux'
        run: go test -fuzz=FuzzSanitize -fuzztime=10s ./internal/textsafe
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - uses: golangci/golangci-lint-action@v9
      - run: go run golang.org/x/vuln/cmd/govulncheck@latest ./...
      # Validate the GoReleaser config here so breakage surfaces before tag day.
      - uses: goreleaser/goreleaser-action@v6
        with:
          version: '~> v2'
          args: check

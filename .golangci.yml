version: "2"

linters:
  settings:
    errcheck:
      # Writes to stdout/stderr and deferred closes on read-only fds carry no
      # actionable error; checking them is pure noise in this codebase.
      exclude-functions:
        - fmt.Fprint
        - fmt.Fprintf
        - fmt.Fprintln
        - (*os.File).Close
        - syscall.Close
        - (io.Closer).Close
        - (io.ReadCloser).Close
        - (net.Conn).Close
        - (net.Conn).SetReadDeadline

version: 2

builds:
  - env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64

archives:
  - formats: [binary]

homebrew_casks:
  - repository:
      owner: mplaczek99
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
    homepage: https://github.com/mplaczek99/network-doctor
    description: Terminal UI that diagnoses network connectivity and explains where the connection breaks
    # Unsigned binary: strip Gatekeeper quarantine on install (per GoReleaser docs).
    hooks:
      post:
        install: |
          if system_command("/usr/bin/xattr", args: ["-h"]).exit_status == 0
            system_command "/usr/bin/xattr", args: ["-dr", "com.apple.quarantine", "#{staged_path}"]
          end

changelog:
  use: github-native

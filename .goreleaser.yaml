version: 2

builds:
  - binary: netdoc
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64

archives:
  - formats: [binary]

source:
  enabled: true
  prefix_template: "{{ .ProjectName }}-{{ .Version }}/"

aur_sources:
  - homepage: https://github.com/heymaikol/network-doctor
    description: Terminal UI that diagnoses network connectivity and explains where the connection breaks
    license: Apache-2.0
    maintainers:
      - Michael Placzek <heymaikol@proton.me>
    private_key: "{{ .Env.AUR_KEY }}"
    git_url: ssh://aur@aur.archlinux.org/network-doctor.git
    build: |-
      cd "${pkgname}-${pkgver}"
      export CGO_ENABLED=0
      export GOFLAGS="-trimpath -mod=readonly -modcacherw"
      go build -ldflags "-s -w -X main.version=${pkgver}" -o netdoc .
    package: |-
      cd "${pkgname}-${pkgver}"
      install -Dm755 netdoc "${pkgdir}/usr/bin/netdoc"
      install -Dm644 LICENSE "${pkgdir}/usr/share/licenses/${pkgname}/LICENSE"

homebrew_casks:
  - repository:
      owner: heymaikol
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
    homepage: https://github.com/heymaikol/network-doctor
    description: Terminal UI that diagnoses network connectivity and explains where the connection breaks
    # Unsigned binary: strip Gatekeeper quarantine on install (per GoReleaser docs).
    hooks:
      post:
        install: |
          if system_command("/usr/bin/xattr", args: ["-h"]).exit_status == 0
            system_command "/usr/bin/xattr", args: ["-dr", "com.apple.quarantine", "#{staged_path}"]
          end

changelog:
  use: github-native
